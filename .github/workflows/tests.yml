name: Run Tests on PR

# Nurodome, kada šis skriptas turi pasileisti
on:
  pull_request:
    branches:
      - main
      - master # Priklausomai nuo to, kaip vadinasi jūsų pagrindinė šaka
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest # GitHub suteiks virtualią mašiną su Linux operacine sistema

    steps:
    # 1. Parsiunčiamas jūsų repozitorijos kodas į virtualią mašiną
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Įdiegiama Python aplinka
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12' # Pakeiskite į Python versiją, kurią naudojate projekte (pvz., '3.11' ar '3.12')

    # 3. Įdiegiamos projekto priklausomybės
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        # Įdiegiame paketus iš jūsų requirements.txt
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # Kadangi turite pyproject.toml ir src/, įdiegiame patį paketą editable režimu
        # (su [dev] extra, kuris atsineša pytest-xdist lygiagretumui)
        pip install -e ".[dev]"

    # 4. Paleidžiami testai (lygiagrečiai; --dist loadscope laiko vieno modulio
    # testus ant to paties workerio, kad module-scoped fixture'ai nebūtų statomi
    # pakartotinai keliuose workeriuose).
    # -n logical (ne auto): nuo ENG-09 psutil yra priklausomybė, o pytest-xdist
    # "auto" su psutil renkasi FIZINIUS branduolius (runner'yje = 2). "logical"
    # naudoja loginius (= 4) -> atkuria ankstesnį 4 worker'ių lygiagretumą.
    - name: Run pytest
      run: |
        pytest -n logical --dist loadscope tests/